<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Buddy</title>
    <link rel="stylesheet" href="styles.css"> <!-- External CSS -->
</head>
<body>

    <!-- Login Form -->
    <div class="login-container" id="login-container">
        <h2>Login</h2>
        <form id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Log In</button>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </form>
    </div>

    <!-- Navigation Bar -->
    <div class="navbar" id="navbar">
        <a href="javascript:void(0);" id="menu-btn">Menu</a>
        <a href="#">Music</a>
        <a href="#">Timer</a>
        <a href="#">Logout</a>

        <!-- Vertical menu -->
        <div class="vertical-menu" id="vertical-menu">
            <a href="#" id="exercise-btn">Exercises</a>
            <a href="#" id="workout-btn">Workouts</a>
            <a href="#">Health</a>
        </div>
    </div>

    <!-- Exercises Section -->
    <div id="exercise-section" style="display: none;">
        <div class="exercise-title">Exercises</div>
        <div class="photo-container">
            <div class="box">
                <img src="https://homeworkouts.org/wp-content/uploads/anim-push-ups.gif" alt="Push-up">
                <div class="description">Push-up: Strengthens upper body.</div>
            </div>
            <div class="box">
                <img src="https://homeworkouts.org/wp-content/uploads/anim-sit-ups.gif" alt="Sit-up">
                <div class="description">Sit-up: Targets the core muscles.</div>
            </div>
        </div>
    </div>

    <!-- Workout Plans Section -->
    <div id="workout-section" style="display: none;">
        <div class="container">
            <h1>Choose Your Workout Plan</h1>
            <button onclick="showWorkout('morning')">Morning Workout</button>
            <button onclick="showWorkout('daily')">Daily Workout</button>
            <button onclick="showWorkout('sevenDays')">7 Days Workout</button>

            <!-- Display workout details here -->
            <div id="workoutDetails" class="workout-plan" style="display:none;">
                <h2 id="workoutTitle"></h2>
                <p id="workoutDescription"></p>
                <div id="exercises" class="exercises"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script> <!-- External JS -->
</body>
</html>
