<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Buddy</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Login Form -->
<div class="container mt-5 pt-5">
    <div class="login-container" id="login-container">
        <h2>Login</h2>
        <form id="login-form">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
            <button type="submit">Log In</button>
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
        </form>
    </div>
</div>

<!-- Navbar (Hidden initially) -->
<nav class="navbar navbar-expand-lg fixed-top d-none">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Workout Buddy</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">Music</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="exerciseDropdown" role="button" data-bs-toggle="dropdown">MENU</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Exercises</a></li>
                        <li><a class="dropdown-item" href="#">Workouts</a></li>
                    </ul>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        Timer: <span id="nav-timer">00:00</span>
                    </a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-outline-light" id="theme-toggle">🌙</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Timer Section -->
<div id="timer-container">
    <div id="timer">00:00</div>
    <div class="inputs-container">
        <input type="number" id="minutes" placeholder="Min" min="0" max="59" />
        <span>:</span>
        <input type="number" id="seconds" placeholder="Sec" min="0" max="59" />
    </div>
    <div>
        <button id="startButton" disabled>Start Timer</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
    <div class="progress-bar">
        <div class="progress-bar-fill" id="progress"></div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    &copy; 2025 Workout Buddy. All Rights Reserved.
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JavaScript -->
<script src="script.js"></script>
</body>
</html>
